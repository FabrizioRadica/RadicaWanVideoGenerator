<div class="panel" id="camera-panel">
  <div class="panel-header">
    <h2>Camera Motion Assistant</h2>
    <label class="toggle" title="Enable camera motion">
      <input type="checkbox" id="cm-enabled">
      <span class="track"></span>
    </label>
  </div>

  <div class="field">
    <label class="field-label">Preset</label>
    <select id="cm-preset">
      <option value="">— Custom —</option>
    </select>
  </div>

  <div class="field">
    <label class="field-label">Movement type</label>
    <div class="movement-grid" id="movement-grid"></div>
  </div>

  <div class="motion-canvas-wrap">
    <span class="canvas-label">Motion preview</span>
    <canvas id="motion-canvas" width="640" height="340"></canvas>
  </div>

  <div class="field">
    <label class="field-label">Movement intensity</label>
    <div class="slider-row">
      <input type="range" id="cm-intensity" min="0" max="1" step="0.05" value="0.65">
      <span class="slider-value" id="v-cm-intensity">0.65</span>
    </div>
  </div>
  <div class="field">
    <label class="field-label">Movement speed</label>
    <div class="slider-row">
      <input type="range" id="cm-speed" min="0" max="1" step="0.05" value="0.55">
      <span class="slider-value" id="v-cm-speed">0.55</span>
    </div>
  </div>
  <div class="field">
    <label class="field-label">Smoothness</label>
    <div class="slider-row">
      <input type="range" id="cm-smoothness" min="0" max="1" step="0.05" value="0.8">
      <span class="slider-value" id="v-cm-smoothness">0.80</span>
    </div>
  </div>

  <div class="orbit-params" id="orbit-params">
    <div class="field">
      <label class="field-label">Path type</label>
      <div class="radio-row" id="cm-path-row">
        <label><input type="radio" name="cm-path" value="full_circle"> Full circle</label>
        <label><input type="radio" name="cm-path" value="arc" checked> Arc</label>
        <label><input type="radio" name="cm-path" value="linear"> Linear</label>
        <label><input type="radio" name="cm-path" value="free"> Free path</label>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Orbit angle</label>
      <div class="slider-row">
        <input type="range" id="cm-angle" min="15" max="360" step="15" value="360">
        <span class="slider-value" id="v-cm-angle">360°</span>
      </div>
    </div>
  </div>

  <div class="field">
    <label class="field-label">Camera distance</label>
    <div class="slider-row">
      <input type="range" id="cm-distance" min="0.5" max="20" step="0.5" value="3.5">
      <span class="slider-value" id="v-cm-distance">3.5m</span>
    </div>
  </div>

  <div class="field">
    <label class="field-label">Camera height</label>
    <div class="slider-row">
      <input type="range" id="cm-height" min="-5" max="15" step="0.5" value="1.5">
      <span class="slider-value" id="v-cm-height">1.5m</span>
    </div>
  </div>

  <div class="field">
    <label class="field-label">Framing</label>
    <select id="cm-framing">
      <option value="stable">Stable</option>
      <option value="centered">Centered</option>
      <option value="rule_of_thirds">Rule of thirds</option>
      <option value="dynamic">Dynamic</option>
    </select>
  </div>

  <div class="field">
    <label class="field-label">Camera prompt text (preview)</label>
    <div class="camera-fragment" id="cm-fragment">—</div>
    <div class="fragment-actions">
      <button class="btn btn-sm" type="button" id="cm-copy">⧉ Copy</button>
      <button class="btn btn-sm btn-primary" type="button" id="cm-apply">＋ Apply to prompt</button>
      <button class="btn btn-sm btn-danger" type="button" id="cm-remove" style="display:none;">− Remove from prompt</button>
    </div>
  </div>
</div>
