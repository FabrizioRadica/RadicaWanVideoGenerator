<div class="panel" id="preview-panel">
  <div class="panel-header">
    <h2>Preview</h2>
    <div>
      <button class="btn btn-icon" id="preview-reload" title="Reload preview">⟳</button>
      <button class="btn btn-icon" id="preview-fullscreen" title="Fullscreen">⛶</button>
    </div>
  </div>

  <div class="preview-stage" id="preview-stage">
    <div class="placeholder" id="preview-placeholder">
      <span class="big">▶</span>
      Generate a video to see the preview here
    </div>
    <video id="preview-video" controls style="display:none;"></video>
    <img id="preview-image" alt="Generated preview" style="display:none;">
  </div>
  <div class="small muted" id="preview-caption" style="margin-top:6px;"></div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <div class="progress-label">
      <span id="progress-stage">Queued</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="action-row" id="stop-generation-row" style="display:none;margin-top:8px;">
      <button class="btn btn-danger btn-sm" id="btn-stop-generation" style="flex:100%;">⏹ Stop Generation</button>
    </div>
    <details class="collapsible">
      <summary>Job log</summary>
      <div class="job-log" id="job-log"></div>
    </details>
  </div>

  <details class="collapsible" id="backend-diagnostics" style="display:none;margin-top:8px;">
    <summary>Backend Diagnostics — Effective Generation Settings</summary>
    <div id="diagnostics-warnings" class="diag-warnings" style="display:none;"></div>
    <div id="diagnostics-body" class="diag-body"></div>
    <div class="action-row" style="margin-top:8px;">
      <button class="btn btn-ghost btn-sm" id="btn-compare-comfyui" title="Save a JSON comparing requested vs effective vs exported ComfyUI settings">⇄ Compare With ComfyUI Settings</button>
    </div>
  </details>

  <div class="action-row">
    <button class="btn btn-primary btn-lg" id="btn-generate" style="flex:100%;">✦ Generate Video</button>
  </div>
  <div class="action-row">
    <button class="btn" id="btn-save-project" title="Save the project file (.wanproj)">🖫 Save Project</button>
    <button class="btn" id="btn-export-workflow" title="Export a ComfyUI-compatible workflow JSON">⇪ Export Workflow</button>
    <button class="btn" id="btn-save-video" title="Download the latest generated video" disabled>⬇ Save Video</button>
  </div>
  <div class="action-row">
    <button class="btn btn-ghost btn-sm" id="btn-open-folder" title="Open the project folder in the file explorer">📁 Open project folder</button>
  </div>
</div>
