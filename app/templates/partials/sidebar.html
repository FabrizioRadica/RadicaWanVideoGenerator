<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">R</div>
    <div>
      <div class="name">{{ app_name }}</div>
      <div class="tagline">{{ app_subtitle }}</div>
    </div>
  </div>
  <div class="sidebar-new">
    <button class="btn btn-primary btn-lg" id="btn-new-project" onclick="WVG.openWizard()">
      <span>＋</span><span class="label">New Project</span>
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">Modules</div>
    <a class="nav-item {{ 'active' if active in ['home', 'videolab'] }}" href="/"><span class="icon">🎬</span><span class="label">VideoLab</span></a>
    <a class="nav-item {{ 'active' if active == 'gamelab' }}" href="/gamelab"><span class="icon">🎮</span><span class="label">GameLab</span></a>
    <a class="nav-item {{ 'active' if active == 'audiolab' }}" href="/audio-lab"><span class="icon">🎵</span><span class="label">AudioLab</span></a>
    <a class="nav-item {{ 'active' if active == 'roboticslab' }}" href="/robotics-lab"><span class="icon">🤖</span><span class="label">RoboticsLab</span></a>
    <a class="nav-item {{ 'active' if active == 'more-modules' }}" href="/more-modules"><span class="icon">▦</span><span class="label">More Modules</span></a>

    <div class="nav-group">Workspace</div>
    <a class="nav-item {{ 'active' if active == 'projects' }}" href="/projects"><span class="icon">▤</span><span class="label">Projects</span></a>
    <a class="nav-item {{ 'active' if active == 'library' }}" href="/library"><span class="icon">▶</span><span class="label">Library</span></a>
    <a class="nav-item {{ 'active' if active == 'models' }}" href="/models"><span class="icon">◈</span><span class="label">Models</span></a>
    <a class="nav-item {{ 'active' if active == 'workflows' }}" href="/workflows"><span class="icon">⇄</span><span class="label">Workflows</span></a>
    <a class="nav-item {{ 'active' if active == 'settings' }}" href="/settings"><span class="icon">⚙</span><span class="label">Settings</span></a>
  </nav>
  <div class="sidebar-footer">
    <strong>{{ app_name }}</strong><br>
    Concept &amp; Design: {{ credits_concept }}<br>
    Project by {{ credits_project }}<br>
    <a href="/about">About</a>
  </div>
</aside>
