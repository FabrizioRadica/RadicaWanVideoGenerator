<div class="panel" id="prompt-panel">
  <div class="panel-header">
    <div class="mode-tabs" id="mode-tabs">
      <button class="mode-tab" data-mode="text2video" type="button">Text2Video</button>
      <button class="mode-tab" data-mode="image2video" type="button">Image2Video</button>
    </div>
    <div class="panel-header-actions">
      <button class="btn btn-sm" id="ai-open-single-clip" type="button" style="display:none;" title="Generate prompts with the AI Prompt Assistant">✨ Prompt Assistant</button>
      <button class="btn btn-sm" id="pl-save-single" type="button" title="Save the current prompt to the Prompt Library">💾 Save</button>
      <button class="btn btn-sm" id="pl-open-single" type="button" title="Open the Prompt Library">📚 Library</button>
    </div>
  </div>

  <div id="i2v-source-block" style="display:none;" class="field">
    <label class="field-label">Source image</label>
    <div id="source-preview-wrap" style="display:none;" class="source-preview">
      <img id="source-preview-img" src="" alt="Source image preview">
      <button class="btn btn-sm overlay-btn" type="button" onclick="WVGUpload.pick()">⇄ Replace image</button>
    </div>
    <div id="dropzone" class="dropzone">
      <strong>Upload source image</strong><br>
      Drop an image here or click to browse<br>
      <span class="small muted" id="upload-hint">jpg, jpeg, png, webp</span>
    </div>
    <input type="file" id="source-file-input" accept="image/*" style="display:none;">
  </div>

  <div class="field">
    <label class="field-label" for="f-positive">Positive prompt</label>
    <textarea id="f-positive" rows="6" maxlength="2000" placeholder="A cinematic scene of a futuristic city at sunset, flying cars, neon lights, ultra realistic, 4k, detailed, atmospheric."></textarea>
    <div class="char-count"><span id="count-positive">0</span> / 2000</div>
  </div>

  <div class="field">
    <label class="field-label" for="f-negative">Negative prompt <span class="muted">(optional)</span></label>
    <textarea id="f-negative" rows="3" maxlength="2000" placeholder="blurry, low quality, distorted, deformed, bad anatomy, watermark, text"></textarea>
    <div class="char-count"><span id="count-negative">0</span> / 2000</div>
  </div>

  <details class="collapsible" id="composed-prompt-details">
    <summary>Final composed prompt</summary>
    <div class="camera-fragment" id="composed-prompt-view" style="font-style:normal;color:var(--text);"></div>
    <p class="small muted" style="margin:6px 0 0;">Positive prompt + camera motion text (when applied). This is what will be sent to the model.</p>
  </details>
</div>
