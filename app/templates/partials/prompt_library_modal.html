<div class="modal-backdrop" id="prompt-library-backdrop">
  <div class="modal" style="max-width:1040px;">
    <div class="modal-header">
      <h2>📚 Prompt Library</h2>
      <span class="hint" id="pl-context-hint"></span>
      <button class="btn btn-icon" type="button" onclick="WVGPromptLibrary.close()">✕</button>
    </div>

    <div class="modal-body">
      <div class="pl-toolbar">
        <input type="search" id="pl-search" placeholder="Search name, tags, prompt text, notes…" style="flex:1;min-width:180px;">
        <button class="btn btn-sm" id="pl-import" type="button">⬆ Import</button>
        <input type="file" id="pl-import-file" accept="application/json,.json" style="display:none;">
        <button class="btn btn-sm btn-ghost" id="pl-rebuild" type="button" title="Rebuild index.json from files">↻ Rebuild</button>
        <button class="btn btn-sm btn-danger" id="pl-empty-trash" type="button" style="display:none;">Empty trash</button>
      </div>

      <div class="mode-tabs" id="pl-filter-tabs" style="margin-bottom:10px;flex-wrap:wrap;">
        <button class="mode-tab active" data-pl-filter="all" type="button">All</button>
        <button class="mode-tab" data-pl-filter="single_clip_prompt" type="button">Single Clip</button>
        <button class="mode-tab" data-pl-filter="sequence_preset" type="button">Sequence Preset</button>
        <button class="mode-tab" data-pl-filter="shared_negative_prompt" type="button">Shared Negative</button>
        <button class="mode-tab" data-pl-filter="trash" type="button">Trash</button>
      </div>

      <div class="pl-grid">
        <div class="pl-list" id="pl-list"></div>
        <div class="pl-detail" id="pl-detail">
          <p class="muted small" style="padding:12px;">Select a prompt to preview and use.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="pl-save-backdrop">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <h2 id="pl-save-title">Save to Prompt Library</h2>
      <button class="btn btn-icon" type="button" onclick="WVGPromptLibrary.closeSave()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label" for="pl-save-name">Name *</label>
        <input type="text" id="pl-save-name" maxlength="120" placeholder="e.g. Beach Sunset Walk">
      </div>
      <div class="field" id="pl-save-scope-field">
        <label class="field-label" for="pl-save-scope">What to save</label>
        <select id="pl-save-scope">
          <option value="both">Positive + Negative</option>
          <option value="positive">Positive prompt only</option>
          <option value="negative">Negative prompt only</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label" for="pl-save-tags">Tags <span class="muted">(optional, comma separated)</span></label>
        <input type="text" id="pl-save-tags" placeholder="beach, sunset, cinematic">
      </div>
      <div class="small muted" id="pl-save-preview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" type="button" onclick="WVGPromptLibrary.closeSave()">Cancel</button>
      <button class="btn btn-primary" id="pl-save-confirm" type="button">💾 Save</button>
    </div>
  </div>
</div>
