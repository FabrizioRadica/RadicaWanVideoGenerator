<header class="topbar">
  <div class="page-title">
    <h1>{{ page_title | default("Home") }}</h1>
    {% if page_subtitle | default("") %}<span class="subtitle">{{ page_subtitle }}</span>{% endif %}
  </div>
  {% if system_monitor_enabled %}
  <div id="sysmon" class="sysmon" title="System resources"
       data-poll-ms="{{ system_monitor_poll_ms }}"
       data-show-gpu="{{ 'true' if system_monitor_show_gpu else 'false' }}"
       data-show-disk="{{ 'true' if system_monitor_show_disk else 'false' }}">
    <span class="sysmon-pill" id="sm-cpu">CPU —</span>
    <span class="sysmon-pill" id="sm-ram">RAM —</span>
    <span class="sysmon-pill" id="sm-gpu">GPU —</span>
    <span class="sysmon-pill" id="sm-vram">VRAM —</span>
    <span class="sysmon-pill" id="sm-disk">Disk —</span>
  </div>
  {% endif %}
  <div class="topbar-actions">
    <span id="topbar-status" class="small muted"></span>
    <a class="btn btn-ghost btn-sm" href="/about" title="About">ⓘ About</a>
  </div>
</header>
<div id="gen-progress-strip" class="gen-strip" style="display:none;"
     data-poll-ms="{{ gen_progress_poll_ms }}"
     data-completed-visible="{{ gen_completed_visible_s }}"
     data-failed-visible="{{ gen_failed_visible_s }}"></div>
