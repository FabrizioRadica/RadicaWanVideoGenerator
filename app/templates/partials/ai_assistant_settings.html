<div class="panel" id="s-ai-assistant">
  <div class="panel-header">
    <h2>🤖 AI Prompt Assistant</h2>
    <span class="hint" id="ai-cfg-status"></span>
  </div>

  <!-- ============ Prompt Assistant ============ -->
  <div class="subsection-title">Prompt Assistant</div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px;">
    <label class="toggle"><input type="checkbox" data-ai-section="prompt_assistant" data-ai-field="enabled"><span class="track"></span><span>Enable Prompt Assistant</span></label>
    <div class="field" style="max-width:280px;">
      <label class="field-label">Default assistant mode</label>
      <select data-ai-section="prompt_assistant" data-ai-field="default_mode">
        <option value="single_clip">Single Clip</option>
        <option value="sequence">Sequence</option>
      </select>
    </div>
    <label class="toggle"><input type="checkbox" data-ai-section="prompt_assistant" data-ai-field="show_button_single_clip"><span class="track"></span><span>Show assistant button in Single Clip</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="prompt_assistant" data-ai-field="show_button_sequence"><span class="track"></span><span>Show assistant button in SequenceQueue</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="prompt_assistant" data-ai-field="auto_apply_prompts"><span class="track"></span><span>Auto-apply generated prompts</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="prompt_assistant" data-ai-field="require_confirmation_sequence"><span class="track"></span><span>Require confirmation before adding AI-generated clips to SequenceQueue</span></label>
  </div>

  <!-- ============ AI Provider ============ -->
  <div class="subsection-title">AI Provider</div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">Provider</label>
      <select data-ai-section="provider" data-ai-field="provider" id="ai-provider-select">
        <option value="ollama">Ollama</option>
        <option value="lmstudio">LM Studio</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="deepseek">DeepSeek</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">Model name</label>
      <input type="text" data-ai-section="provider" data-ai-field="model_name" id="ai-model-name" placeholder="llama3.1">
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">Base URL</label>
      <input type="text" data-ai-section="provider" data-ai-field="base_url" id="ai-base-url" placeholder="http://localhost:11434">
    </div>
    <div class="field">
      <label class="field-label">API key <span class="muted" id="ai-key-set-note"></span></label>
      <input type="password" data-ai-section="provider" data-ai-field="api_key" id="ai-api-key" placeholder="leave blank to keep existing" autocomplete="off">
    </div>
  </div>
  <div class="field-row">
    <div class="field"><label class="field-label">Temperature</label><input type="number" min="0" max="2" step="0.05" data-ai-section="provider" data-ai-field="temperature"></div>
    <div class="field"><label class="field-label">Max tokens</label><input type="number" min="1" max="32000" step="1" data-ai-section="provider" data-ai-field="max_tokens"></div>
    <div class="field"><label class="field-label">Timeout (s)</label><input type="number" min="5" max="1200" step="1" data-ai-section="provider" data-ai-field="timeout_seconds"></div>
  </div>
  <div class="field">
    <label class="field-label">System prompt override <span class="muted">(optional — blank uses the built-in prompt)</span></label>
    <textarea rows="3" data-ai-section="provider" data-ai-field="system_prompt_override" placeholder="Leave blank to use the default WanVideoGenerator assistant prompt."></textarea>
  </div>
  <div class="action-row">
    <button class="btn btn-sm" id="ai-test-btn" type="button">🔌 Test connection</button>
    <span class="small muted" id="ai-test-result"></span>
  </div>
  <p class="small muted" style="margin:8px 0 0;">⚠ The API key is stored locally in <span class="mono">ai_assistant_config.json</span> in plain text (single-user local tool). Do not use this on a shared machine with a key you cannot rotate.</p>

  <!-- ============ Resource Management ============ -->
  <div class="subsection-title" style="margin-top:16px;">Resource Management (protects WAN VRAM/RAM)</div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:10px;">
    <label class="toggle"><input type="checkbox" data-ai-section="resources" data-ai-field="release_after_generation"><span class="track"></span><span>Release local LLM after prompt generation</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="resources" data-ai-field="block_during_render"><span class="track"></span><span>Block local AI assistant during WAN/video render</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="resources" data-ai-field="allow_during_render"><span class="track"></span><span>Allow local AI assistant during render (override — not recommended)</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="resources" data-ai-field="warn_high_vram"><span class="track"></span><span>Warn when VRAM usage is high</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="resources" data-ai-field="warn_high_ram"><span class="track"></span><span>Warn when RAM usage is high</span></label>
  </div>
  <div class="field-row">
    <div class="field"><label class="field-label">Min free VRAM before AI (GB)</label><input type="number" min="0" step="0.5" data-ai-section="resources" data-ai-field="min_free_vram_gb" placeholder="optional"></div>
    <div class="field"><label class="field-label">Min free RAM before AI (GB)</label><input type="number" min="0" step="0.5" data-ai-section="resources" data-ai-field="min_free_ram_gb" placeholder="optional"></div>
  </div>
  <div class="field-row">
    <div class="field"><label class="field-label">Min free VRAM before WAN after AI (GB)</label><input type="number" min="0" step="0.5" data-ai-section="resources" data-ai-field="min_free_vram_for_render_gb" placeholder="optional"></div>
    <div class="field"><label class="field-label">Min free RAM before WAN after AI (GB)</label><input type="number" min="0" step="0.5" data-ai-section="resources" data-ai-field="min_free_ram_for_render_gb" placeholder="optional"></div>
    <div class="field"><label class="field-label">Cooldown after release (s)</label><input type="number" min="0" max="60" step="0.5" data-ai-section="resources" data-ai-field="cooldown_after_release_seconds"></div>
  </div>

  <!-- ============ Audio Feedback ============ -->
  <div class="subsection-title" style="margin-top:16px;">Audio Feedback</div>
  <div style="display:flex;flex-direction:column;gap:10px;">
    <label class="toggle"><input type="checkbox" data-ai-section="audio_feedback" data-ai-field="enabled"><span class="track"></span><span>Enable audio feedback</span></label>
    <div class="field" style="max-width:280px;">
      <label class="field-label">Volume <span id="ai-vol-val" class="muted"></span></label>
      <input type="range" min="0" max="1" step="0.05" data-ai-section="audio_feedback" data-ai-field="volume" id="ai-vol">
    </div>
    <label class="toggle"><input type="checkbox" data-ai-section="audio_feedback" data-ai-field="on_single_clip_complete"><span class="track"></span><span>Play sound when single clip generation completes</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="audio_feedback" data-ai-field="on_sequence_complete"><span class="track"></span><span>Play sound when SequenceQueue generation completes</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="audio_feedback" data-ai-field="on_ai_sequence_created"><span class="track"></span><span>Play sound when AI finishes populating a sequence</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="audio_feedback" data-ai-field="on_warning"><span class="track"></span><span>Play sound on warning</span></label>
    <label class="toggle"><input type="checkbox" data-ai-section="audio_feedback" data-ai-field="on_error"><span class="track"></span><span>Play sound on error</span></label>
    <div class="action-row">
      <button class="btn btn-sm btn-ghost" id="ai-test-sound" type="button">🔊 Test sound</button>
    </div>
  </div>

  <div class="action-row" style="margin-top:16px;">
    <button class="btn btn-primary" id="ai-save-btn" type="button">💾 Save AI Assistant settings</button>
  </div>
</div>
