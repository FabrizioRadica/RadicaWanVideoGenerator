<div class="panel" id="audio-panel">
  <div class="panel-header">
    <h2>Audio Tracks</h2>
    <span class="hint">Post-processing — mixed into the video after generation</span>
  </div>

  <div class="field" style="display:flex;gap:8px;align-items:center;">
    <button class="btn btn-sm" id="btn-add-audio">＋ Add Audio Track</button>
    <input type="file" id="audio-file-input" accept=".mp3,.wav,.ogg,.flac,.m4a" style="display:none;">
    <span class="small muted" id="audio-empty-hint">No audio tracks yet.</span>
  </div>

  <div id="audio-track-list" class="audio-track-list"></div>

  <div class="field" style="border-top:1px solid var(--border-soft);padding-top:10px;margin-top:4px;">
    <label class="field-label" for="audio-apply-target">Apply to video</label>
    <div class="field-row" style="align-items:center;">
      <select id="audio-apply-target" style="flex:1;"></select>
      <button class="btn btn-primary btn-sm" id="btn-apply-audio">♫ Apply Audio</button>
    </div>
    <div class="small muted" style="margin-top:4px;">
      Creates <span class="mono">…_final</span> with mixed audio — the raw video is never modified.
    </div>
  </div>
</div>
